;==============================================================================
; File: modelsim.ini
;
; Description:
;   ModelSim configuration file defining logical libraries and mappings.
;   This template contains many commonly used libraries commented out so
;   the project can easily be expanded.
;
;==============================================================================

[Library]

;------------------------------------------------------------------------------
; Default compilation library
;------------------------------------------------------------------------------
; All compiled design units go into this library unless specified otherwise.

work = work


;------------------------------------------------------------------------------
; IEEE standard libraries
;------------------------------------------------------------------------------
; These are normally mapped automatically by ModelSim installation,
; but can be explicitly declared if needed.

ieee            = $MODEL_TECH/../ieee
std             = $MODEL_TECH/../std


;------------------------------------------------------------------------------
; VHDL standard libraries
;------------------------------------------------------------------------------

;ieee_proposed   = $MODEL_TECH/../ieee_proposed


;------------------------------------------------------------------------------
; Verification libraries
;------------------------------------------------------------------------------

;osvvm           = ./lib/osvvm
;uvvm            = ./lib/uvvm
;uvm             = ./lib/uvm


;------------------------------------------------------------------------------
; Vendor libraries (commonly used in FPGA projects)
;------------------------------------------------------------------------------

;--------------------------------------
; Xilinx libraries
;--------------------------------------

;unisim          = ./lib/unisim
;unimacro        = ./lib/unimacro
;xpm             = ./lib/xpm
;secureip        = ./lib/secureip


;--------------------------------------
; Intel / Altera libraries
;--------------------------------------

;altera_mf       = ./lib/altera_mf
;lpm             = ./lib/lpm
;cyclonev        = ./lib/cyclonev
;arria10         = ./lib/arria10
;stratix10       = ./lib/stratix10


;------------------------------------------------------------------------------
; Custom project libraries
;------------------------------------------------------------------------------

;rtl_lib         = ./lib/rtl
;tb_lib          = ./lib/tb
;ip_lib          = ./lib/ip


;------------------------------------------------------------------------------
; End of file
